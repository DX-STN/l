<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SYNC TEST MODE - Feedback Edition</title>
<style>
body { margin:0; background:#111; overflow:hidden; display:flex; flex-direction:column; align-items:center; font-family: sans-serif; }
.canvas { width:90vw; margin:10px 0; background:#222; position:relative; overflow:hidden; touch-action:none; }
#nav-container { height:20vh; }
#main-container { height:45vh; background:#333; }
#main-img,#nav-img { position:absolute; top:0; left:0; transform-origin:0 0; pointer-events:none; display:none; image-rendering:pixelated; }
.crop-box { position:absolute; border:2px solid #4da3ff; box-sizing:border-box; pointer-events:none; display:none; z-index: 2; }
.crop-box.locked { border-color: #ff4d4d; }
.handle-indicator { position:absolute; pointer-events:none; display:none; z-index:15; background: rgba(77,163,255,0.4); }
.locked-highlight { background: rgba(255,77,77,0.4); }
.nav-box { position:absolute; border:2px solid #4da3ff; box-sizing:border-box; pointer-events:none; display:none; z-index: 3; }
.handle { position:absolute; pointer-events:auto; }
#file-input { margin: 10px; color: white; }
.ui-row { display: flex; align-items: center; justify-content: space-between; gap: 5px; width: 90vw; padding: 5px 0; box-sizing: border-box; }
.stats { color: #4da3ff; font-size: 11px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 20px; border: 1px solid #4da3ff; white-space: nowrap; flex-shrink: 1; overflow: hidden; }
#toggle-az { padding:10px 15px; background:#4da3ff; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
/* 通知トースト：方向によって色を変えたりも可能 */
#toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #ff4d4d; padding: 12px 24px; border-radius: 8px; border: 1px solid #ff4d4d; display: none; z-index: 100; pointer-events: none; font-weight: bold; box-shadow: 0 0 15px rgba(255,77,77,0.5); font-size: 16px; }
#main-img, .crop-box, .handle { transition: transform 0.3s ease-out, left 0.3s ease-out, top 0.3s ease-out, width 0.3s ease-out, height 0.3s ease-out; }
.dragging #main-img, .dragging .crop-box, .dragging .handle { transition: none; }
</style>
</head>
<body>
<div id="nav-container" class="canvas"><img id="nav-img"><div id="nav-box" class="nav-box"></div></div>
<div class="ui-row">
  <button id="toggle-az">オートズーム: ON</button>
  <div id="stats" class="stats">倍率: --- / 1px幅: --- px</div>
</div>
<div id="main-container" class="canvas">
 <img id="main-img">
 <div id="crop-box" class="crop-box">
  <div id="ind_n_o" class="handle-indicator"></div><div id="ind_s_o" class="handle-indicator"></div>
  <div id="ind_e_o" class="handle-indicator"></div><div id="ind_w_o" class="handle-indicator"></div>
  <div id="ind_n_i" class="handle-indicator"></div><div id="ind_s_i" class="handle-indicator"></div>
  <div id="ind_e_i" class="handle-indicator"></div><div id="ind_w_i" class="handle-indicator"></div>
 </div>
 <div id="hn_o" class="handle" data-edge="n"></div><div id="hs_o" class="handle" data-edge="s"></div>
 <div id="he_o" class="handle" data-edge="e"></div><div id="hw_o" class="handle" data-edge="w"></div>
 <div id="hn_i" class="handle" data-edge="n"></div><div id="hs_i" class="handle" data-edge="s"></div>
 <div id="he_i" class="handle" data-edge="e"></div><div id="hw_i" class="handle" data-edge="w"></div>
</div>
<div id="toast">画像の端です</div>
<input type="file" id="file-input" accept="image/*">

<script>
const navImg = document.getElementById('nav-img'), mainImg = document.getElementById('main-img'), navBox = document.getElementById('nav-box'), cropBox = document.getElementById('crop-box'), mCont = document.getElementById('main-container'), nCont = document.getElementById('nav-container'), fileInput = document.getElementById('file-input'), btnToggle = document.getElementById('toggle-az'), statsDiv = document.getElementById('stats'), toast = document.getElementById('toast');

let img={w:0,h:0,isLoaded:false}, view={x:0,y:0,scale:1}, sel={x:0,y:0,w:0,h:0};
let touch={mode:'',lastX:0,lastY:0,lastDist:0,lastScale:1,edge:'',startX:0,startY:0, pivotX:0, pivotY:0};
let isAutoZoom = true, isLocked = false, wasMoved = false;
let longPressTimer = null, toastTimer = null, pendingToast = null;
let lockedBox = { L: 0, T: 0, W: 0, H: 0 };

btnToggle.onclick = () => { isAutoZoom = !isAutoZoom; update(); };

fileInput.onchange = e=>{
 const f=e.target.files[0]; if(!f)return; // 注意：[0]を忘れないこと！
 const r=new FileReader();
 r.onload=ev=>{
  navImg.src=mainImg.src=ev.target.result;
  mainImg.onload=()=>{
   img.w=mainImg.naturalWidth; img.h=mainImg.naturalHeight; img.isLoaded=true;
   sel={x:0,y:0,w:img.w,h:img.h};
   const mr = mCont.getBoundingClientRect();
   view.scale = Math.min(mr.width/img.w, mr.height/img.h);
   view.x = (mr.width - img.w*view.scale)/2;
   view.y = (mr.height - img.h*view.scale)/2;
   mainImg.style.display=navImg.style.display=cropBox.style.display=navBox.style.display='block';
   update();
  };
 };
 r.readAsDataURL(f);
};

mCont.addEventListener('touchstart',e=>{
 if(!img.isLoaded)return;
 const t=e.touches; mCont.classList.add('dragging');
 if(t.length===1){
  touch.mode = e.target.classList.contains('handle') ? 'edit' : 'scroll';
  if(touch.mode==='edit') touch.edge=e.target.dataset.edge;
  touch.lastX=t[0].pageX; touch.lastY=t[0].pageY;
  touch.startX = t[0].pageX; touch.startY = t[0].pageY;
  wasMoved = false;
  if(e.target.classList.contains('handle')) setIndicatorsDisplay('block');
  
  longPressTimer = setTimeout(() => {
    if(wasMoved) return;
    const mr = mCont.getBoundingClientRect();
    const bx = (touch.startX - mr.left - view.x) / view.scale, by = (touch.startY - mr.top - view.y) / view.scale;
    const margin = 50 / view.scale;
    const inBox = (bx >= sel.x - margin && bx <= sel.x + sel.w + margin && by >= sel.y - margin && by <= sel.y + sel.h + margin);
    if(inBox) { 
      isLocked = !isLocked; 
      if(isLocked) {
        lockedBox.L = view.x + sel.x * view.scale; lockedBox.T = view.y + sel.y * view.scale;
        lockedBox.W = sel.w * view.scale; lockedBox.H = sel.h * view.scale;
      }
      setIndicatorsDisplay('none'); update(); 
    }
    else if(!isLocked) executeWarp(touch.startX, touch.startY);
    longPressTimer = null;
  }, 1000);
 } else if(t.length===2){
  cancelLongPress(); touch.mode='zoom';
  const mr = mCont.getBoundingClientRect();
  touch.lastDist = Math.hypot(t[0].pageX - t[1].pageX, t[0].pageY - t[1].pageY);
  touch.lastScale = view.scale;
  touch.pivotX = (t[0].pageX + t[1].pageX) / 2 - mr.left;
  touch.pivotY = (t[0].pageY + t[1].pageY) / 2 - mr.top;
 }
},{passive:false});

mCont.addEventListener('touchmove',e=>{
 if(!touch.mode)return; e.preventDefault();
 const t=e.touches; const mr = mCont.getBoundingClientRect();
 if(longPressTimer) {
   const dist = Math.hypot(t[0].pageX - touch.startX, t[0].pageY - touch.startY);
   if(dist > 10) { cancelLongPress(); setIndicatorsDisplay('none'); wasMoved = true; }
 }
 
 if(touch.mode==='zoom' && t.length===2){
  const dist = Math.hypot(t[0].pageX - t[1].pageX, t[0].pageY - t[1].pageY);
  let nScale = touch.lastScale * (dist / touch.lastDist);
  const minS = Math.min(mr.width / img.w, mr.height / img.h), maxS = 40;
  if(nScale < minS) { nScale = minS; setPendingToast('画像最小'); }
  if(nScale > maxS) { nScale = maxS; setPendingToast('最大拡大'); }

  const ratio = nScale / view.scale;
  let nX = touch.pivotX - (touch.pivotX - view.x) * ratio, nY = touch.pivotY - (touch.pivotY - view.y) * ratio;
  const cW = img.w * nScale, cH = img.h * nScale;
  if (cW > mr.width) nX = Math.min(0, Math.max(nX, mr.width - cW)); else nX = (mr.width - cW) / 2;
  if (cH > mr.height) nY = Math.min(0, Math.max(nY, mr.height - cH)); else nY = (mr.height - cH) / 2;

  view.x = nX; view.y = nY; view.scale = nScale;

  if(isLocked){
    sel.w = lockedBox.W / view.scale; sel.h = lockedBox.H / view.scale;
    const iX = (lockedBox.L - view.x) / view.scale, iY = (lockedBox.T - view.y) / view.scale;
    if(iX < 0) setPendingToast('画像の左端'); if(iX > img.w - sel.w) setPendingToast('画像の右端');
    if(iY < 0) setPendingToast('画像の上端'); if(iY > img.h - sel.h) setPendingToast('画像の下端');
    sel.x = Math.max(0, Math.min(iX, img.w - sel.w)); sel.y = Math.max(0, Math.min(iY, img.h - sel.h));
    view.x = lockedBox.L - sel.x * view.scale; view.y = lockedBox.T - sel.y * view.scale;
  }
 } else if(touch.mode==='scroll'){
  const dx = t[0].pageX - touch.lastX, dy = t[0].pageY - touch.lastY;
  let nX = view.x + dx, nY = view.y + dy;
  const cW = img.w * view.scale, cH = img.h * view.scale;
  if (cW > mr.width) {
    if(nX > 0) setPendingToast('画像の左端'); if(nX < mr.width - cW) setPendingToast('画像の右端');
    nX = Math.min(0, Math.max(nX, mr.width - cW));
  } else nX = (mr.width - cW) / 2;
  if (cH > mr.height) {
    if(nY > 0) setPendingToast('画像の上端'); if(nY < mr.height - cH) setPendingToast('画像の下端');
    nY = Math.min(0, Math.max(nY, mr.height - cH));
  } else nY = (mr.height - cH) / 2;
  view.x = nX; view.y = nY;

  if(isLocked){
    const iX = (lockedBox.L - view.x) / view.scale, iY = (lockedBox.T - view.y) / view.scale;
    sel.x = Math.max(0, Math.min(iX, img.w - sel.w)); sel.y = Math.max(0, Math.min(iY, img.h - sel.h));
    view.x = lockedBox.L - sel.x * view.scale; view.y = lockedBox.T - sel.y * view.scale;
  }
  touch.lastX=t[0].pageX; touch.lastY=t[0].pageY;
 } else if(touch.mode==='edit' && !isLocked){
  let dx=(t[0].pageX-touch.lastX)/view.scale, dy=(t[0].pageY-touch.lastY)/view.scale;
  if(touch.edge==='n'){ sel.y+=dy; sel.h-=dy; } if(touch.edge==='s'){ sel.h+=dy; }
  if(touch.edge==='e'){ sel.w+=dx; } if(touch.edge==='w'){ sel.x+=dx; sel.w-=dx; }
  if(sel.x < 0) setPendingToast('画像の左端'); if(sel.y < 0) setPendingToast('画像の上端');
  if(sel.x + sel.w > img.w) setPendingToast('画像の右端'); if(sel.y + sel.h > img.h) setPendingToast('画像の下端');
  sel.x=Math.max(0,Math.min(sel.x,img.w-sel.w)); sel.y=Math.max(0,Math.min(sel.y,img.h-sel.h));
  sel.w=Math.max(1,Math.min(sel.w,img.w-sel.x)); sel.h=Math.max(1,Math.min(sel.h,img.h-sel.y));
  touch.lastX=t[0].pageX; touch.lastY=t[0].pageY;
 }
 update();
},{passive:false});

  
/*
mCont.addEventListener('touchend',()=>{
 cancelLongPress(); mCont.classList.remove('dragging'); setIndicatorsDisplay('none');
 if(pendingToast) { showToast(pendingToast); pendingToast = null; }
 if(touch.mode==='edit' || isLocked){
  const oX = sel.x, oY = sel.y;
  sel.x=Math.round(sel.x); sel.y=Math.round(sel.y); sel.w=Math.round(sel.w); sel.h=Math.round(sel.h);
  if(isLocked){ view.x = lockedBox.L - sel.x * view.scale; view.y = lockedBox.T - sel.y * view.scale; }
  else { handleAutoZoom(); }
 }
 touch.mode=''; update();
});
*/


mCont.addEventListener('touchend',()=>{
 cancelLongPress(); mCont.classList.remove('dragging'); setIndicatorsDisplay('none');
 if(pendingToast) { showToast(pendingToast); pendingToast = null; }

 if(touch.mode==='edit' || isLocked){
  if(isLocked){
    // ★【ロック時のピクセルフィット】枠に画像を吸着させる
    // 1. 枠の幅(lockedBox.W)の中に、現在の画像ピクセル(sel.w)が何倍ならピッタリ入るか再計算
    // これにより「中途半端な倍率」を「ピクセルが枠に合う倍率」に微調整する
    const fitScaleW = lockedBox.W / Math.round(sel.w);
    const fitScaleH = lockedBox.H / Math.round(sel.h);
    
    // 縦横比を崩さないよう、より近い方の倍率を採用（または用途に合わせて選択）
    view.scale = (Math.abs(view.scale - fitScaleW) < Math.abs(view.scale - fitScaleH)) ? fitScaleW : fitScaleH;
    
    // 倍率の上限40pxも維持
    if(view.scale > 40) view.scale = 40;

    // 2. データ上の座標を整数(ピクセル)に丸める
    sel.x = Math.round(sel.x);
    sel.y = Math.round(sel.y);
    sel.w = Math.round(sel.w);
    sel.h = Math.round(sel.h);

    // 3. 画像の表示位置(view.x/y)を、枠の画面位置(lockedBox)とピクセル境界が重なるように補正
    view.x = lockedBox.L - sel.x * view.scale;
    view.y = lockedBox.T - sel.y * view.scale;

  } else {
    // 通常モードのフィット
    sel.x=Math.round(sel.x); sel.y=Math.round(sel.y); sel.w=Math.round(sel.w); sel.h=Math.round(sel.h);
    handleAutoZoom();
  }
 }
 touch.mode=''; update();
});


  

function setPendingToast(msg) { pendingToast = msg; }

function showToast(msg) {
  toast.innerText = msg;
  toast.style.display = 'block';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.style.display = 'none'; }, 800);
}

function setIndicatorsDisplay(val) {
  document.querySelectorAll('.handle-indicator').forEach(i => {
    i.style.display = val;
    if(isLocked) i.classList.add('locked-highlight'); else i.classList.remove('locked-highlight');
  });
}
function cancelLongPress() { if(longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } }
function executeWarp(sx, sy) {
  const mr = mCont.getBoundingClientRect();
  const bx = (sx - mr.left - view.x) / view.scale, by = (sy - mr.top - view.y) / view.scale;
  sel.x = Math.round(Math.max(0, Math.min(bx - sel.w/2, img.w - sel.w)));
  sel.y = Math.round(Math.max(0, Math.min(by - sel.h/2, img.h - sel.h)));
  handleAutoZoom(); update();
}

function update() {
  if (!img.isLoaded) return;
  const mr = mCont.getBoundingClientRect();
  statsDiv.innerText = `倍率: ${view.scale.toFixed(2)} / 1px: ${view.scale.toFixed(1)}px / LOCK: ${isLocked ? 'ON' : 'OFF'}`;
  btnToggle.innerText = `オートズーム: ${isAutoZoom ? 'ON' : 'OFF'}`;
  btnToggle.style.background = isAutoZoom ? '#4da3ff' : '#666';
  if(isLocked) cropBox.classList.add('locked'); else cropBox.classList.remove('locked');
  mainImg.style.transform = `translate(${view.x}px,${view.y}px) scale(${view.scale})`;
  let L, T, W, H;
  if(isLocked) { L = lockedBox.L; T = lockedBox.T; W = lockedBox.W; H = lockedBox.H; }
  else { L = view.x + sel.x * view.scale; T = view.y + sel.y * view.scale; W = sel.w * view.scale; H = sel.h * view.scale; }
  cropBox.style.left = L+'px'; cropBox.style.top = T+'px'; cropBox.style.width = W+'px'; cropBox.style.height = H+'px';
  const pad = 50, dPW = Math.min(pad, W), dPH = Math.min(pad, H), isHL = W > H;
  ['n', 's', 'e', 'w'].forEach(edge => {
    const o = document.getElementById(`h${edge}_o`), i = document.getElementById(`h${edge}_i`), io = document.getElementById(`ind_${edge}_o`), ii = document.getElementById(`ind_${edge}_i`), b = (edge === 'n' ? T : (edge === 's' ? T + H : (edge === 'w' ? L : L + W)));
    if (edge === 'n' || edge === 's') {
      o.style.width = W + 'px'; o.style.left = L + 'px'; o.style.top = (edge === 'n' ? b - pad : b) + 'px'; o.style.height = pad + 'px';
      i.style.width = W + 'px'; i.style.left = L + 'px'; i.style.top = (edge === 'n' ? b : b - dPH) + 'px'; i.style.height = dPH + 'px';
      io.style.width = '100%'; io.style.left = '0'; io.style.height = pad + 'px'; io.style.top = (edge === 'n' ? -pad : H) + 'px';
      ii.style.width = '100%'; ii.style.left = '0'; ii.style.height = dPH + 'px'; ii.style.top = (edge === 'n' ? 0 : H - dPH) + 'px';
    } else {
      o.style.height = H + 'px'; o.style.top = T + 'px'; o.style.left = (edge === 'w' ? b - pad : b) + 'px'; o.style.width = pad + 'px';
      i.style.height = H + 'px'; i.style.top = T + 'px'; i.style.left = (edge === 'w' ? b : b - dPW) + 'px'; i.style.width = dPW + 'px';
      io.style.height = '100%'; io.style.top = '0'; io.style.width = pad + 'px'; io.style.left = (edge === 'w' ? -pad : W) + 'px';
      ii.style.height = '100%'; ii.style.top = '0'; ii.style.width = dPW + 'px'; ii.style.left = (edge === 'w' ? 0 : W - dPW) + 'px';
    }
    o.style.zIndex = 20; const isS = isHL ? (edge === 'e' || edge === 'w') : (edge === 'n' || edge === 's'); i.style.zIndex = isS ? 10 : 5;
  });
  const nr = nCont.getBoundingClientRect(), ns = Math.min(nr.width / img.w, nr.height / img.h), nx = (nr.width - img.w * ns) / 2, ny = (nr.height - img.h * ns) / 2;
  navImg.style.transform = `translate(${nx}px,${ny}px) scale(${ns})`;
  navBox.style.left = (nx + sel.x * ns) + 'px'; navBox.style.top = (ny + sel.y * ns) + 'px'; navBox.style.width = (sel.w * ns) + 'px'; navBox.style.height = (sel.h * ns) + 'px';
}

function handleAutoZoom(){
 if(!isAutoZoom || isLocked) return;
 const mr = mCont.getBoundingClientRect();
 let tS = Math.min(Math.max(Math.min(mr.width / sel.w, mr.height / sel.h), Math.min(mr.width / img.w, mr.height / img.h)), 40);
 view.x = (mr.width / 2) - (sel.x + sel.w / 2) * tS;
 view.y = (mr.height / 2) - (sel.y + sel.h / 2) * tS;
 view.scale = tS;
}
</script>
</body>
</html>
